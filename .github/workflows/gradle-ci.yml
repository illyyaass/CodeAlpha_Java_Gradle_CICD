name: Java Gradle CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew (if exists)
      run: |
        if [ -f gradlew ]; then chmod +x gradlew; fi

    - name: Initialize and Build with Gradle
      run: gradle build

    - name: Run Automated Unit Tests
      run: gradle test